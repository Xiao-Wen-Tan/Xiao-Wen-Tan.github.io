<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Xiaowen Tan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .cv-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: clamp(2rem, 4vw, 3.5rem) var(--pad);
    }
    .cv-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .cv-download {
      font-size: 13px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 2px;
      transition: background 0.12s;
    }
    .cv-download:hover { background: #f5f5f5; text-decoration: none; color: var(--text); }
    .cv-frame {
      width: 100%;
      height: 85vh;
      border: 1px solid var(--border);
      display: block;
    }
    .cv-fallback {
      display: none;
      padding: 3rem;
      text-align: center;
      background: #fafafa;
      border: 1px solid var(--border);
      font-size: 15px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-name" href="index.html">Xiaowen Tan</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Wen</a></li>
      <li><a href="index.html#research">Research</a></li>
      <li><a href="teaching.html">Teaching</a></li>
      <li><a href="service.html">Service</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="https://www.linkedin.com/in/xiaowen-tan-338783273" target="_blank">LinkedIn</a></li>
    </ul>
  </div>
</nav>

<div class="cv-wrap">
  <div class="cv-toolbar">
    <div class="section-header" style="margin-bottom:0;">
      <p class="section-label" style="margin-bottom:0;">CV</p>
    </div>
    <a class="cv-download" href="cv.pdf" download>↓ Download PDF</a>
  </div>

  <iframe class="cv-frame" src="cv.pdf" title="Xiaowen Tan CV"
          onerror="this.style.display='none';document.querySelector('.cv-fallback').style.display='block';">
  </iframe>
  <div class="cv-fallback">
    Your browser can't preview PDFs inline.
    <a href="cv.pdf" download>Download the CV instead →</a>
  </div>
</div>

<footer>
  <p class="footer-name">Xiaowen Tan</p>
  <p class="footer-info">
    Naveen Jindal School of Management · University of Texas at Dallas<br>
    <a href="mailto:xiaowen.tan@utdallas.edu">xiaowen.tan@utdallas.edu</a>
  </p>
</footer>

</body>
</html>
